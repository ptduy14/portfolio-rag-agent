name: Keep Systems Alive
on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up systems
        run: |
          echo "🚀 Sending Heartbeat to Hugging Face & Supabase..."
          
          RESPONSE=$(curl -s https://ptduy14-portfolio-rag-agent.hf.space/heartbeat)
          
          echo "📥 Response: $RESPONSE"
          
          if [[ $RESPONSE == *"success"* ]]; then
            echo "✅ SUCCESS: Database is touched and alive!"
          else
            echo "❌ FAILED: Could not reach Database or Backend error."
            exit 1
          fi
